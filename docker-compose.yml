# Commander development compose file
# Start with: docker compose up --build
#
# Ports per doctrine/docker/PORTS.md:
#   8200 - Commander backend HTTP
#   8201 - JVM debugger (JDWP)
#   8202 - Spring Actuator
#   8210 - Commander frontend dev server

services:
  commander-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: commander-backend
    ports:
      - "8200:8200"   # Backend HTTP
      - "8201:8201"   # JVM debugger
      - "8202:8202"   # Actuator
    environment:
      # Enable JDWP for remote debugging
      JAVA_TOOL_OPTIONS: >-
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:8201
      # Spring profile
      SPRING_PROFILES_ACTIVE: dev
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8202/actuator/health"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 3

  commander-ui:
    build:
      context: ./commander-ui
      dockerfile: Dockerfile
      target: dev
    container_name: commander-ui
    ports:
      - "8210:8210"   # Frontend dev server
    environment:
      - VITE_API_URL=http://commander-backend:8200
    depends_on:
      commander-backend:
        condition: service_healthy
